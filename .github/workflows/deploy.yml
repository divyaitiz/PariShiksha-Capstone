name: Build and Deploy NCERT QA Bot

on:
  push:
    branches:
      - main        # full build + deploy
  pull_request:
    branches:
      - main        # build + test only, no deploy

jobs:
  # ── Job 1: Build and push Docker image to Azure ACR ──────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:${{ github.sha }}

  # ── Job 2: Deploy to Azure Container Instance ─────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build                         # only runs after build succeeds
    if: github.ref == 'refs/heads/main'  # only on main branch

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instance
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          dns-name-label: ncert-qa-bot
          image: ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:${{ github.sha }}
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          name: ${{ secrets.CONTAINER_NAME }}
          location: eastus
          ports: 8501
          environment-variables: |
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
            AZURE_BLOB_CONTAINER=${{ secrets.AZURE_BLOB_CONTAINER }}
