name: Build and Deploy NCERT QA Bot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Build and push Docker image to Azure ACR ──────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:${{ github.sha }}

  # ── Job 2: Deploy to Azure Container Instance ─────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Delete existing container first to avoid duplicate env var errors
      - name: Delete existing container (if exists)
        run: |
          az container delete \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.CONTAINER_NAME }} \
            --yes 2>/dev/null || echo "No existing container to delete"

      - name: Deploy to Azure Container Instance
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          dns-name-label: ncert-qa-bot
          image: ${{ secrets.ACR_LOGIN_SERVER }}/ncert-qa-bot:${{ github.sha }}
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          name: ${{ secrets.CONTAINER_NAME }}
          location: uaenorth
          ports: 8501
          # Non-sensitive config only
          environment-variables: >-
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          # Sensitive values go here — ACI encrypts these at rest
          secure-environment-variables: >-
            AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
            AZURE_BLOB_CONTAINER=${{ secrets.AZURE_BLOB_CONTAINER }}